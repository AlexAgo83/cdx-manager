name: Publish PyPI

on:
  release:
    types:
      - published

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate versions match release tag
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          PYTHON_VERSION="$(python -c "import pathlib, re; print(re.search(r'^version = \"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text(), re.M).group(1))")"
          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "package.json version $PACKAGE_VERSION does not match release tag $GITHUB_REF_NAME"
            exit 1
          fi
          if [ "$PYTHON_VERSION" != "$RELEASE_VERSION" ]; then
            echo "pyproject.toml version $PYTHON_VERSION does not match release tag $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build package
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
