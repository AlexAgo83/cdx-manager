name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Package dry-run
        run: npm --cache /tmp/cdx-npm-cache pack --dry-run
