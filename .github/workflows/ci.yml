name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Lint and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint
        run: python -m py_compile bin/cdx src/*.py test/test_*_py.py
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/pycache

      - name: Test
        run: python -m unittest discover -s test -p 'test_*_py.py'
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/pycache

      - name: Package dry-run
        run: npm pack --dry-run
        env:
          npm_config_cache: ${{ runner.temp }}/cdx-npm-cache
