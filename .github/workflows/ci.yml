name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Lint and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint
        run: python -m py_compile bin/cdx src/*.py test/test_*_py.py
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/pycache

      - name: Test
        run: python -m unittest discover -s test -p 'test_*_py.py'
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/pycache

      - name: Package dry-run
        run: npm pack --dry-run
        env:
          npm_config_cache: ${{ runner.temp }}/cdx-npm-cache

      - name: Windows install and CLI smoke
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          npm_config_cache: ${{ runner.temp }}/cdx-npm-cache
        run: |
          $shimDir = Join-Path $env:RUNNER_TEMP "cdx-shims"
          New-Item -ItemType Directory -Force -Path $shimDir | Out-Null

          @'
          @echo off
          if "%1"=="login" if "%2"=="status" (
            echo Logged in using ChatGPT
            exit /b 0
          )
          exit /b 0
          '@ | Set-Content -Path (Join-Path $shimDir "codex.cmd") -Encoding ascii

          @'
          @echo off
          if "%1"=="auth" if "%2"=="status" (
            echo {"loggedIn": true, "authMethod": "oauth"}
            exit /b 0
          )
          exit /b 0
          '@ | Set-Content -Path (Join-Path $shimDir "claude.cmd") -Encoding ascii

          @'
          @echo off
          exit /b 0
          '@ | Set-Content -Path (Join-Path $shimDir "script.cmd") -Encoding ascii

          $env:PATH = "$shimDir;$env:PATH"
          $env:CDX_HOME = Join-Path $env:RUNNER_TEMP "cdx-home"

          npm install -g .
          cdx --version
          cdx add smoke
          cdx add claude smoke-claude
          cdx status --json
          cdx doctor --json
          cdx notify --next-ready --once --json
          cdx rmv smoke --force
          cdx rmv smoke-claude --force
